services:
  - type: web
    name: slooze-api
    env: node
    plan: free
    repo: https://github.com/shaiksumaiah/slooze-backend
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && ./node_modules/.bin/nest build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: slooze-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: slooze-db
    databaseName: slooze
    user: slooze_user
    plan: free
